<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HW Notifier Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --line-green: #06c755;
      --ink: #203040;
      --bg-top: #e9f8f2;
      --bg-bottom: #f6fbff;
      --card: #ffffff;
      --muted: #6a7a87;
      --danger: #d94f4f;
      --border: #dce8ef;
    }
    * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: radial-gradient(circle at 20% -10%, #d0f5e2, transparent 30%),
                  linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 28px 18px 34px; }
    .hero {
      background: linear-gradient(130deg, #05b34c 0%, #06c755 40%, #35d985 100%);
      border-radius: 20px;
      padding: 20px 22px;
      color: white;
      box-shadow: 0 14px 30px rgba(6, 199, 85, 0.25);
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0; font-size: 1.45rem; }
    .hero p { margin: 6px 0 0; opacity: .95; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0 0;
    }
    .stat {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .stat .label { font-size: .82rem; opacity: .92; }
    .stat .value { font-size: 1.15rem; font-weight: 700; margin-top: 2px; }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(32, 48, 64, 0.06);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: .86rem; font-weight: 600; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px;
      font-size: .95rem;
      margin-bottom: 11px;
      background: #fcfeff;
    }
    input:focus, textarea:focus { outline: none; border-color: #87d9ad; background: white; }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--line-green);
      color: white;
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 700;
      transition: .2s;
    }
    button:hover { transform: translateY(-1px); background: #05b34c; }
    button:disabled { opacity: .65; transform: none; cursor: not-allowed; }

    .sheet-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .sheet-toolbar input {
      margin: 0;
      max-width: 320px;
    }
    .muted { color: var(--muted); font-size: .85rem; }
    .status { min-height: 1.1rem; font-size: .9rem; font-weight: 700; margin-top: 8px; }
    .table-wrap { overflow: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { border-collapse: collapse; width: 100%; min-width: 670px; background: white; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #edf3f7; vertical-align: top; font-size: .9rem; }
    th { text-align: left; background: #f7fcfa; font-size: .84rem; color: #4e616f; position: sticky; top: 0; }
    .danger { color: var(--danger); }
    .row-send { white-space: nowrap; }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Homework LINE Dashboard</h1>
      <p>ดึงการบ้านจาก Google Sheet แล้วส่งเข้า LINE ได้ทันทีทีละแถว</p>
      <div class="stats">
        <div class="stat"><div class="label">รายการทั้งหมด</div><div class="value" id="totalRows">0</div></div>
        <div class="stat"><div class="label">ส่งแล้ว</div><div class="value" id="sentRows">0</div></div>
        <div class="stat"><div class="label">สถานะล่าสุด</div><div class="value" id="lastState">พร้อมใช้งาน</div></div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>ส่งเองแบบ Manual</h2>
        <form id="manualForm">
          <label>ชื่อวิชา</label>
          <input name="subject" required placeholder="ระบุวิชา">

          <label>หัวข้อ/งาน</label>
          <input name="title" required placeholder="ระบุชื่อหัวข้อ">

          <label>รายละเอียด</label>
          <textarea name="detail" rows="3" required placeholder="รายละเอียดเพิ่มเติม"></textarea>

          <label>กำหนดส่ง</label>
          <input type="datetime-local" name="due" required>

          <button type="submit" id="manualSubmitBtn">ส่งข้อมูลเข้า LINE</button>
          <div class="status" id="manualStatus"></div>
        </form>
      </article>

      <article class="card">
        <h2>รายการจาก Google Sheet</h2>
        <div class="sheet-toolbar">
          <button id="reloadSheetBtn" type="button">รีโหลดจากชีต</button>
          <input id="filterInput" type="text" placeholder="ค้นหา วิชา/หัวข้อ/รายละเอียด">
          <span class="muted" id="sheetHint">โหลดข้อมูลล่าสุดจาก CSV export</span>
        </div>
        <div class="status" id="sheetStatus"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>วิชา</th>
                <th>หัวข้อ</th>
                <th>รายละเอียด</th>
                <th>วันที่</th>
                <th>ส่ง</th>
              </tr>
            </thead>
            <tbody id="sheetRows"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

  <script>
    const manualForm = document.getElementById('manualForm');
    const manualSubmitBtn = document.getElementById('manualSubmitBtn');
    const manualStatus = document.getElementById('manualStatus');
    const sheetRows = document.getElementById('sheetRows');
    const sheetStatus = document.getElementById('sheetStatus');
    const reloadSheetBtn = document.getElementById('reloadSheetBtn');
    const sheetHint = document.getElementById('sheetHint');
    const filterInput = document.getElementById('filterInput');
    const totalRows = document.getElementById('totalRows');
    const sentRows = document.getElementById('sentRows');
    const lastState = document.getElementById('lastState');

    let sheetData = [];
    let sentCount = 0;

    function setStatus(el, text, isError = false) {
      el.textContent = text;
      el.style.color = isError ? '#d94f4f' : '#1f7a44';
      lastState.textContent = text || 'พร้อมใช้งาน';
    }

    function updateStats() {
      totalRows.textContent = String(sheetData.length);
      sentRows.textContent = String(sentCount);
    }

    async function requestJson(url, options = {}) {
      const res = await fetch(url, options);
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(body.error || 'request_failed');
      }
      return body;
    }

    function rowHtml(row, index) {
      const safe = (v) => (v || '-').toString();
      return `
        <tr>
          <td>${safe(row.rowId)}</td>
          <td>${safe(row.subject)}</td>
          <td>${safe(row.title)}</td>
          <td>${safe(row.detail)}</td>
          <td>${safe(row.due)}</td>
          <td class="row-send">
            <button type="button" data-row-index="${index}" class="send-row-btn">ส่งแถวนี้</button>
          </td>
        </tr>
      `;
    }

    function renderFilteredRows() {
      const query = filterInput.value.trim().toLowerCase();
      const filtered = !query
        ? sheetData
        : sheetData.filter((row) => `${row.subject || ''} ${row.title || ''} ${row.detail || ''}`.toLowerCase().includes(query));

      if (filtered.length === 0) {
        sheetRows.innerHTML = '<tr><td colspan="6" class="muted">ไม่พบข้อมูลที่ตรงกับคำค้นหา</td></tr>';
        return;
      }

      sheetRows.innerHTML = filtered.map((row) => rowHtml(row, sheetData.indexOf(row))).join('');
    }

    async function loadSheetRows() {
      sheetRows.innerHTML = '<tr><td colspan="6" class="muted">กำลังโหลด...</td></tr>';
      sheetStatus.textContent = '';

      try {
        const data = await requestJson('/api/sheet-rows');
        if (!data.rows || data.rows.length === 0) {
          sheetData = [];
          updateStats();
          sheetRows.innerHTML = '<tr><td colspan="6" class="muted">ไม่มีข้อมูลในชีต</td></tr>';
          setStatus(sheetStatus, 'โหลดสำเร็จ แต่ยังไม่มีแถวข้อมูล');
          return;
        }

        sheetData = data.rows;
        updateStats();
        renderFilteredRows();
        setStatus(sheetStatus, `โหลดสำเร็จ ${data.rows.length} แถว`);
      } catch (err) {
        sheetData = [];
        updateStats();
        sheetRows.innerHTML = '<tr><td colspan="6" class="danger">โหลดข้อมูลจากชีตไม่สำเร็จ</td></tr>';
        setStatus(sheetStatus, err.message || 'โหลดข้อมูลล้มเหลว', true);
      }
    }

    manualForm.onsubmit = async (e) => {
      e.preventDefault();
      manualSubmitBtn.disabled = true;
      setStatus(manualStatus, 'กำลังส่ง...');

      try {
        await requestJson('/notify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.fromEntries(new FormData(manualForm)))
        });
        sentCount += 1;
        updateStats();
        setStatus(manualStatus, 'ส่งสำเร็จ');
        manualForm.reset();
      } catch (err) {
        setStatus(manualStatus, err.message || 'ส่งไม่สำเร็จ', true);
      } finally {
        manualSubmitBtn.disabled = false;
      }
    };

    sheetRows.onclick = async (e) => {
      const button = e.target.closest('.send-row-btn');
      if (!button) {
        return;
      }

      const rowIndex = Number(button.getAttribute('data-row-index'));
      const rowData = sheetData[rowIndex];
      if (!rowData) {
        setStatus(sheetStatus, 'ข้อมูลแถวไม่ถูกต้อง', true);
        return;
      }

      button.disabled = true;
      button.textContent = 'กำลังส่ง...';
      try {
        await requestJson('/notify-row', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rowData)
        });
        sentCount += 1;
        updateStats();
        button.textContent = 'ส่งแล้ว';
        setStatus(sheetStatus, `ส่งแถว ${rowData.rowId || ''} สำเร็จ`);
      } catch (err) {
        button.disabled = false;
        button.textContent = 'ส่งแถวนี้';
        setStatus(sheetStatus, err.message || 'ส่งไม่สำเร็จ', true);
      }
    };

    reloadSheetBtn.onclick = () => {
      loadSheetRows();
    };

    filterInput.oninput = () => {
      renderFilteredRows();
    };

    (async () => {
      try {
        const config = await requestJson('/api/config');
        if (!config.hasGoogleSheet) {
          sheetHint.textContent = 'ยังไม่ได้ตั้ง GOOGLE_SHEET_CSV_URL ใน .env';
          sheetHint.classList.add('danger');
        }
      } catch (_) {}
      updateStats();
      loadSheetRows();
    })();
  </script>
</body>
</html>
